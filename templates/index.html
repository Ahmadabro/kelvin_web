<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential configuration parameter layout settings for responsive viewport handling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KELVIN ENGINE v4.0</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>KELVIN ENGINE v4.0</header>

    <div id="chat-window">
        <div class="bubble ai">System Ready. Awaiting prompt guidelines...</div>
    </div>

    <div class="input-zone">
        <input type="text" id="query" placeholder="Ask Kelvin..." autocomplete="off">
        <button id="send-btn" onclick="sendQuery()">EXECUTE</button>
    </div>

    <script>
        async function sendQuery() {
            const input = document.getElementById('query');
            const chat = document.getElementById('chat-window');
            const btn = document.getElementById('send-btn');
            const prompt = input.value.trim();
            
            if (!prompt) return;
            
            btn.disabled = true;
            
            // Render User Bubble
            chat.innerHTML += `<div class="bubble user">${prompt}</div>`;
            input.value = '';
            
            // Render Elegant Loading State
            chat.innerHTML += `<div id="loading" class="bubble ai">Processing query stream...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                
                const data = await res.json();
                document.getElementById('loading').remove();

                if (res.ok) {
                    const htmlContent = marked.parse(data.reply);
                    chat.innerHTML += `<div class="bubble ai">${htmlContent}</div>`;
                } else {
                    chat.innerHTML += `<div class="bubble ai" style="color: #ef4444;">System Override: ${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById('loading').remove();
                chat.innerHTML += `<div class="bubble ai" style="color: #ef4444;">Network link failure.</div>`;
            }
            
            // Re-initialize code block syntax styling checks
            hljs.highlightAll();
            
            // Smoothly track conversation downward
            setTimeout(() => {
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            }, 50);
            
            btn.disabled = false;
            
            // Auto re-focus input area for seamless desktop execution
            if(window.innerWidth > 768) {
                input.focus();
            }
        }

        document.getElementById('query').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendQuery(); });
    </script>
</body>
</html>
